<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Metis — 앱 사용 가이드</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 30px 20px;
            font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
        }

        /* ── 타이틀 ── */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header-badge {
            display: inline-block;
            background: rgba(201,169,98,0.15);
            border: 1px solid rgba(201,169,98,0.4);
            color: #c9a962;
            font-size: 11px;
            letter-spacing: 2px;
            padding: 5px 16px;
            border-radius: 20px;
            margin-bottom: 12px;
        }
        .header h1 {
            color: #fff;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .header p { color: #888; font-size: 13px; }

        /* ── 스텝 네비게이션 ── */
        .step-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 28px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .step-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #333;
            cursor: pointer;
            transition: all 0.3s;
        }
        .step-dot.active { background: #c9a962; transform: scale(1.3); }
        .step-dot.visited { background: #8b7355; }

        /* ── 메인 뷰 ── */
        .tutorial-view {
            position: relative;
            width: 360px;
        }

        /* 폰 프레임 */
        .phone-frame {
            width: 360px;
            border-radius: 40px;
            overflow: hidden;
            border: 3px solid #2a2a2a;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            background: #fff;
            position: relative;
        }

        /* 스크린 래퍼: 이미지 영역 클립 */
        .screen-clip {
            position: relative;
            width: 100%;
            overflow: hidden;
        }

        .screen-img {
            width: 100%;
            display: block;
            user-select: none;
        }

        /* ── 딤 오버레이 ── */
        .dim-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        /* 하이라이트 구멍 (spotlight) */
        .spotlight {
            position: absolute;
            border-radius: 12px;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.62);
            border: 2px solid #c9a962;
            transition: all 0.4s cubic-bezier(0.68,-0.55,0.27,1.55);
            pointer-events: none;
        }

        /* ── 툴팁 카드 ── */
        .tooltip-card {
            position: absolute;
            background: #fff;
            border-radius: 16px;
            padding: 14px 16px;
            width: 210px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            pointer-events: none;
            transition: all 0.4s ease;
            z-index: 100;
        }

        .tooltip-card::before {
            content: '';
            position: absolute;
            width: 0; height: 0;
        }

        /* 아래에서 올라오는 화살표 */
        .tooltip-card.arrow-bottom::before {
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 10px solid #fff;
            bottom: -10px; left: 20px;
        }

        /* 위에서 내려오는 화살표 */
        .tooltip-card.arrow-top::before {
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 10px solid #fff;
            top: -10px; left: 20px;
        }

        /* 오른쪽 화살표 */
        .tooltip-card.arrow-right::before {
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            border-left: 10px solid #fff;
            right: -10px; top: 20px;
        }

        /* 왼쪽 화살표 */
        .tooltip-card.arrow-left::before {
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            border-right: 10px solid #fff;
            left: -10px; top: 20px;
        }

        .tooltip-step {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .tooltip-num {
            width: 22px; height: 22px;
            background: #c9a962;
            color: #fff;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 800;
            flex-shrink: 0;
        }

        .tooltip-tag {
            font-size: 10px;
            color: #c9a962;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .tooltip-title {
            font-size: 14px;
            font-weight: 800;
            color: #111;
            margin-bottom: 5px;
            line-height: 1.3;
        }

        .tooltip-desc {
            font-size: 12px;
            color: #666;
            line-height: 1.6;
        }

        /* ── 컨트롤 영역 ── */
        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 360px;
            margin-top: 24px;
        }

        .ctrl-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            transition: all 0.2s;
        }

        .ctrl-btn.prev {
            background: #222;
            color: #888;
        }

        .ctrl-btn.next {
            background: #c9a962;
            color: #fff;
        }

        .ctrl-btn:hover { opacity: 0.85; transform: translateY(-1px); }
        .ctrl-btn:disabled { opacity: 0.3; cursor: default; transform: none; }

        .step-counter {
            font-size: 13px;
            color: #666;
        }

        .step-counter span { color: #c9a962; font-weight: 700; }

        /* ── 완료 화면 ── */
        .done-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 40px;
            text-align: center;
        }

        .done-icon { font-size: 48px; }
        .done-title { color: #fff; font-size: 22px; font-weight: 700; }
        .done-desc { color: #888; font-size: 14px; line-height: 1.7; }
        .done-btn {
            margin-top: 10px;
            padding: 14px 40px;
            background: #c9a962;
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }

        /* 진행률 바 */
        .progress-bar {
            width: 360px;
            height: 3px;
            background: #222;
            border-radius: 2px;
            margin-bottom: 24px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #c9a962, #f0d799);
            border-radius: 2px;
            transition: width 0.4s ease;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-badge">TUTORIAL</div>
        <h1>Club Metis 이용 가이드</h1>
        <p>핵심 기능을 6단계로 알아보세요</p>
    </div>

    <!-- 진행률 바 -->
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 14%;"></div>
    </div>

    <!-- 스텝 도트 -->
    <div class="step-nav" id="stepNav"></div>

    <!-- 메인 튜토리얼 뷰 -->
    <div class="tutorial-view" id="tutorialView">
        <div class="phone-frame">
            <div class="screen-clip" id="screenClip">
                <img class="screen-img" id="screenImg" src="" alt="App Screen">
                <!-- 스포트라이트 -->
                <div class="spotlight" id="spotlight"></div>
                <!-- 딤 -->
                <div class="dim-overlay" id="dimOverlay"></div>
            </div>
        </div>
        <!-- 툴팁 -->
        <div class="tooltip-card" id="tooltipCard">
            <div class="tooltip-step">
                <div class="tooltip-num" id="tipNum">1</div>
                <span class="tooltip-tag" id="tipTag">INPUT</span>
            </div>
            <div class="tooltip-title" id="tipTitle">타이틀</div>
            <div class="tooltip-desc" id="tipDesc">설명</div>
        </div>
    </div>

    <!-- 컨트롤 -->
    <div class="controls">
        <button class="ctrl-btn prev" id="prevBtn" onclick="changeStep(-1)">← 이전</button>
        <span class="step-counter"><span id="currentStepNum">1</span> / <span id="totalStepNum">7</span></span>
        <button class="ctrl-btn next" id="nextBtn" onclick="changeStep(1)">다음 →</button>
    </div>

    <!-- 완료 화면 -->
    <div class="done-screen" id="doneScreen">
        <div class="done-icon">🏆</div>
        <div class="done-title">가이드 완료!</div>
        <div class="done-desc">이제 Club Metis의 모든 기능을<br>자유롭게 활용하실 수 있습니다.<br><br>첫 딜에 도전해보세요.</div>
        <button class="done-btn" onclick="restartTutorial()">처음부터 다시 보기</button>
    </div>

    <script>
        /* ─────────────────────────────────────────────
           이미지 기준 좌표 설명
           screen-img width = 360px
           화면1(입찰현황)  원본 1290×2796 → 비율 1:2.17
           표시 height ≈ 781px
        ───────────────────────────────────────────── */

        // 이미지 파일 경로
        const IMAGES = {
            screen1: 'tutorial_screen1.png',  // 입찰 현황 (1위)
            screen2: 'tutorial_screen2.png',  // 스크롤 아래 (커뮤니티, 설명)
            screen3: 'tutorial_screen3.png',  // 메티스랭킹
        };

        // 스텝 정의
        // spotlight: {top%, left%, width%, height%} — 이미지 높이 기준 %
        // tooltip: {top, left} px (폰 프레임 기준 절대)
        // arrowDir: 툴팁 화살표 방향

        const steps = [
            {
                image: 'screen1',
                tag: '입찰 타이머',
                num: 1,
                title: '⏱ 입찰 마감 카운트다운',
                desc: '딜이 마감되는 시간을 실시간으로 표시합니다. 시간 내에 입찰을 완료하세요.',
                spotlight: { top: 12.5, left: 2, width: 96, height: 13 },
                tooltip: { top: 185, left: -225 },
                arrowDir: 'arrow-right',
            },
            {
                image: 'screen1',
                tag: '입찰 컨트롤',
                num: 2,
                title: '💰 입찰금액 조절',
                desc: '− / + 버튼으로 금액을 조절하고 "변경" 버튼으로 입찰을 확정하세요. "취소"로 언제든 철회 가능합니다.',
                spotlight: { top: 26.5, left: 2, width: 96, height: 10 },
                tooltip: { top: 275, left: -225 },
                arrowDir: 'arrow-right',
            },
            {
                image: 'screen1',
                tag: '실시간 알림',
                num: 3,
                title: '🔔 새 입찰자 알림',
                desc: '다른 입찰자가 새로 참여하면 실시간으로 배너가 표시됩니다. TOP 3 여부도 확인 가능합니다.',
                spotlight: { top: 40.5, left: 2, width: 96, height: 8 },
                tooltip: { top: 355, left: -225 },
                arrowDir: 'arrow-right',
            },
            {
                image: 'screen1',
                tag: '입찰 현황',
                num: 4,
                title: '📊 입찰 분포 그래프',
                desc: '낮은 금액부터 높은 금액까지 입찰자들이 어떻게 분포되어 있는지 한눈에 확인합니다.',
                spotlight: { top: 50, left: 2, width: 96, height: 16 },
                tooltip: { top: 455, left: -225 },
                arrowDir: 'arrow-right',
            },
            {
                image: 'screen1',
                tag: '커뮤니티',
                num: 5,
                title: '💬 커뮤니티',
                desc: '같은 딜에 참여한 입찰자들과 댓글을 나눌 수 있습니다. 입찰 변경 이력도 자동으로 기록됩니다.',
                spotlight: { top: 63, left: 2, width: 96, height: 13 },
                tooltip: { top: 530, left: -225 },
                arrowDir: 'arrow-right',
            },
            {
                image: 'screen1',
                tag: '상세 정보',
                num: 6,
                title: '📋 제품 상세페이지',
                desc: '제품의 핵심 내용을 한눈에 확인할 수 있는 상세 정보 영역입니다. 스크롤을 내리면 더 많은 정보를 볼 수 있습니다.',
                spotlight: { top: 74, left: 2, width: 96, height: 13 },
                tooltip: { top: 560, left: -225 },
                arrowDir: 'arrow-right',
            },
        ];

        let currentStep = 0;
        const totalSteps = steps.length;

        // 도트 생성
        const stepNav = document.getElementById('stepNav');
        for (let i = 0; i < totalSteps; i++) {
            const dot = document.createElement('div');
            dot.className = 'step-dot' + (i === 0 ? ' active' : '');
            dot.onclick = () => goToStep(i);
            stepNav.appendChild(dot);
        }

        document.getElementById('totalStepNum').textContent = totalSteps;

        function goToStep(index) {
            currentStep = index;
            renderStep();
        }

        function changeStep(dir) {
            const next = currentStep + dir;
            if (next < 0) return;
            if (next >= totalSteps) {
                showDone();
                return;
            }
            currentStep = next;
            renderStep();
        }

        function renderStep() {
            const step = steps[currentStep];
            const imgEl = document.getElementById('screenImg');
            const spotlight = document.getElementById('spotlight');
            const tooltip = document.getElementById('tooltipCard');

            // 이미지 전환
            imgEl.src = IMAGES[step.image];

            // 이미지 로드 후 스포트라이트 배치
            imgEl.onload = () => positionElements(step);
            if (imgEl.complete) positionElements(step);

            // 툴팁 내용
            document.getElementById('tipNum').textContent = step.num;
            document.getElementById('tipTag').textContent = step.tag;
            document.getElementById('tipTitle').textContent = step.title;
            document.getElementById('tipDesc').textContent = step.desc;

            // 툴팁 화살표
            tooltip.className = 'tooltip-card ' + step.arrowDir;

            // 도트 업데이트
            document.querySelectorAll('.step-dot').forEach((d, i) => {
                d.className = 'step-dot';
                if (i === currentStep) d.classList.add('active');
                else if (i < currentStep) d.classList.add('visited');
            });

            // 진행률
            const pct = ((currentStep + 1) / totalSteps) * 100;
            document.getElementById('progressFill').style.width = pct + '%';
            document.getElementById('currentStepNum').textContent = currentStep + 1;

            // 버튼
            document.getElementById('prevBtn').disabled = currentStep === 0;

            // 뷰 표시
            document.getElementById('tutorialView').style.display = 'block';
            document.querySelector('.controls').style.display = 'flex';
            document.getElementById('doneScreen').style.display = 'none';
        }

        function positionElements(step) {
            const imgEl = document.getElementById('screenImg');
            const spotlight = document.getElementById('spotlight');
            const tooltip = document.getElementById('tooltipCard');
            const clip = document.getElementById('screenClip');

            const imgH = imgEl.offsetHeight;
            const imgW = imgEl.offsetWidth;

            const sp = step.spotlight;
            const top = (sp.top / 100) * imgH;
            const left = (sp.left / 100) * imgW;
            const width = (sp.width / 100) * imgW;
            const height = (sp.height / 100) * imgH;

            spotlight.style.top = top + 'px';
            spotlight.style.left = left + 'px';
            spotlight.style.width = width + 'px';
            spotlight.style.height = height + 'px';

            // 스크롤: 스포트라이트가 화면 안에 오도록 clip 스크롤
            const clipH = clip.offsetHeight;
            const scrollTarget = Math.max(0, top - clipH * 0.3);
            clip.scrollTop = scrollTarget;

            // 툴팁 위치
            tooltip.style.top = (top + height / 2 - 60) + 'px';
            tooltip.style.left = step.tooltip.left + 'px';
        }

        function showDone() {
            document.getElementById('tutorialView').style.display = 'none';
            document.querySelector('.controls').style.display = 'none';
            document.getElementById('doneScreen').style.display = 'flex';
            document.getElementById('progressFill').style.width = '100%';
            document.querySelectorAll('.step-dot').forEach(d => {
                d.className = 'step-dot visited';
            });
        }

        function restartTutorial() {
            currentStep = 0;
            document.getElementById('doneScreen').style.display = 'none';
            renderStep();
        }

        // 초기 렌더
        renderStep();

        // clip 최대 높이 설정 (폰처럼 보이게)
        document.getElementById('screenClip').style.maxHeight = '700px';
        document.getElementById('screenClip').style.overflowY = 'hidden';
    </script>

</body>
</html>
